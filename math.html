<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>速算小达人 - 20以内加减法</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #FFE4E1 0%, #B0E0E6 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 100%;
            height: calc(100vh - 20px);
            position: relative;
            overflow-y: auto;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: shimmer 4s infinite;
            z-index: 0;
        }

        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 1.8em;
            color: #FF6B6B;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header .subtitle {
            color: #888;
            font-size: 0.9em;
        }

        .game-section {
            position: relative;
            z-index: 1;
            height: calc(100% - 70px);
            display: flex;
            flex-direction: column;
        }

        .timer {
            background: linear-gradient(135deg, #4ECDC4 0%, #45B7D1 100%);
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }

        .progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: #4ECDC4;
            transform: scale(1.2);
        }

        .progress-dot.correct {
            background: #4CAF50;
        }

        .progress-dot.incorrect {
            background: #f44336;
        }

        .equation-box {
            background: linear-gradient(145deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            margin-bottom: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .equation-box:hover {
            border-color: #FF6B6B;
            transform: translateY(-1px);
        }

        .equation {
            font-size: 2.2em;
            font-weight: bold;
            color: #4ECDC4;
            margin: 10px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-section {
            margin: 15px 0;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 1.8em;
            border: 3px solid #ddd;
            border-radius: 15px;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .answer-input:focus {
            border-color: #4ECDC4;
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.2);
        }

        .feedback {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 1em;
            font-weight: bold;
            display: none;
        }

        .feedback.correct {
            background: #D4EDDA;
            color: #155724;
            border: 2px solid #C3E6CB;
            display: block;
        }

        .feedback.incorrect {
            background: #F8D7DA;
            color: #721C24;
            border: 2px solid #F5C6CB;
            display: block;
        }

        .number-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
            flex-grow: 1;
        }

        .number-btn {
            padding: 15px 10px;
            font-size: 1.3em;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #f5f7fa 0%, #e4e8ec 100%);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .number-btn:hover {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .number-btn:active {
            transform: scale(0.95);
        }

        .control-btn {
            grid-column: span 3;
            padding: 12px 10px;
            font-size: 1.1em;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .control-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .result-content {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            width: 100%;
            max-width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .result-content h2 {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-stats {
            margin: 20px 0;
        }

        .stat-item {
            font-size: 1.2em;
            margin: 10px 0;
            color: #555;
        }

        .stat-value {
            font-weight: bold;
            color: #FF6B6B;
            font-size: 1.1em;
        }

        .praise-text {
            font-size: 1.1em;
            color: #666;
            margin: 20px 0;
            line-height: 1.5;
        }

        .stars {
            position: absolute;
            font-size: 1.5em;
            animation: twinkle 1.5s infinite;
            z-index: 0;
        }

        .star-1 { top: 5%; left: 5%; }
        .star-2 { top: 15%; right: 10%; }
        .star-3 { bottom: 10%; left: 15%; }
        .star-4 { bottom: 20%; right: 5%; }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .fireworks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: firework 1s ease-out forwards;
        }

        @keyframes firework {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stars star-1">⭐</div>
        <div class="stars star-2">🌟</div>
        <div class="stars star-3">✨</div>
        <div class="stars star-4">⭐</div>
        
        <div class="header">
            <h1>速算小达人</h1>
            <p class="subtitle">20以内加减法练习</p>
        </div>

        <div class="game-section">
            <div class="timer" id="timer">00:00.00</div>
            
            <div class="progress" id="progress">
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>

            <div class="equation-box">
                <div class="equation" id="equation">点击开始按钮开始游戏</div>
                
                <div class="answer-section">
                    <input type="number" class="answer-input" id="answerInput" placeholder="请输入答案" min="0" max="20" disabled>
                    <div class="feedback" id="feedback"></div>
                </div>
            </div>

            <div class="number-pad">
                <button class="number-btn" onclick="addNumber(1)">1</button>
                <button class="number-btn" onclick="addNumber(2)">2</button>
                <button class="number-btn" onclick="addNumber(3)">3</button>
                <button class="number-btn" onclick="addNumber(4)">4</button>
                <button class="number-btn" onclick="addNumber(5)">5</button>
                <button class="number-btn" onclick="addNumber(6)">6</button>
                <button class="number-btn" onclick="addNumber(7)">7</button>
                <button class="number-btn" onclick="addNumber(8)">8</button>
                <button class="number-btn" onclick="addNumber(9)">9</button>
                <button class="number-btn" onclick="addNumber(0)">0</button>
                <button class="control-btn" id="startBtn" onclick="startGame()">开始游戏</button>
                <button class="control-btn" id="clearBtn" onclick="clearAnswer()" disabled>清除</button>
                <button class="control-btn" id="submitBtn" onclick="checkAnswer()" disabled>提交答案</button>
            </div>
        </div>
    </div>

    <div class="result-screen" id="resultScreen">
        <div class="fireworks" id="fireworks"></div>
        <div class="result-content">
            <h2>🎉 挑战完成！</h2>
            <div class="result-stats">
                <div class="stat-item">用时：<span class="stat-value" id="finalTime">00:00.00</span></div>
                <div class="stat-item">正确：<span class="stat-value" id="correctCount">0</span> 题</div>
                <div class="stat-item">正确率：<span class="stat-value" id="accuracy">0</span>%</div>
            </div>
            <div class="praise-text" id="praiseText"></div>
            <button class="control-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏变量
        let gameStarted = false;
        let currentEquation = {};
        let correctCount = 0;
        let totalCount = 0;
        let startTime = 0;
        let timerInterval;
        let autoNextTimer;

        // DOM元素
        const equation = document.getElementById('equation');
        const answerInput = document.getElementById('answerInput');
        const feedback = document.getElementById('feedback');
        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const submitBtn = document.getElementById('submitBtn');
        const timer = document.getElementById('timer');
        const progress = document.getElementById('progress');
        const resultScreen = document.getElementById('resultScreen');
        const finalTime = document.getElementById('finalTime');
        const correctCountEl = document.getElementById('correctCount');
        const accuracyEl = document.getElementById('accuracy');
        const praiseText = document.getElementById('praiseText');

        // 生成随机加减法算式
        function generateEquation() {
            const isAddition = Math.random() > 0.5;
            let a, b, answer;
            
            if (isAddition) {
                a = Math.floor(Math.random() * 11) + 1;
                b = Math.floor(Math.random() * (20 - a + 1)) + 1;
                answer = a + b;
                equation.textContent = `${a} + ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * 20) + 1;
                b = Math.floor(Math.random() * a) + 1;
                answer = a - b;
                equation.textContent = `${a} - ${b} = ?`;
            }
            
            return { answer };
        }

        // 开始游戏
        function startGame() {
            gameStarted = true;
            correctCount = 0;
            totalCount = 0;
            startTime = Date.now();
            
            startBtn.disabled = true;
            answerInput.disabled = false;
            clearBtn.disabled = false;
            submitBtn.disabled = false;
            
            // 重置进度点
            progress.querySelectorAll('.progress-dot').forEach(dot => {
                dot.className = 'progress-dot';
            });
            
            // 开始计时器
            timerInterval = setInterval(updateTimer, 10);
            
            // 生成第一题
            generateNextEquation();
        }

        // 生成下一题
        function generateNextEquation() {
            if (totalCount >= 10) {
                endGame();
                return;
            }
            
            currentEquation = generateEquation();
            answerInput.value = '';
            feedback.textContent = '';
            feedback.className = 'feedback';
            
            // 更新进度点
            const dots = progress.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index < totalCount) {
                    dot.className = 'progress-dot ' + (index < correctCount ? 'correct' : 'incorrect');
                } else if (index === totalCount) {
                    dot.className = 'progress-dot active';
                } else {
                    dot.className = 'progress-dot';
                }
            });
            
            // 3秒自动跳转
            clearTimeout(autoNextTimer);
            autoNextTimer = setTimeout(() => {
                if (gameStarted) {
                    totalCount++;
                    generateNextEquation();
                }
            }, 3000);
        }

        // 更新计时器
        function updateTimer() {
            const elapsed = Date.now() - startTime;
            const minutes = Math.floor(elapsed / 60000).toString().padStart(2, '0');
            const seconds = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
            const milliseconds = Math.floor((elapsed % 1000) / 10).toString().padStart(2, '0');
            timer.textContent = `${minutes}:${seconds}.${milliseconds}`;
        }

        // 检查答案
        function checkAnswer() {
            const userAnswer = parseInt(answerInput.value);
            
            if (isNaN(userAnswer)) {
                feedback.textContent = '请输入答案';
                feedback.className = 'feedback incorrect';
                return;
            }
            
            clearTimeout(autoNextTimer);
            
            if (userAnswer === currentEquation.answer) {
                feedback.textContent = '✓ 正确！';
                feedback.className = 'feedback correct';
                correctCount++;
            } else {
                feedback.textContent = `✗ 错误！正确答案是 ${currentEquation.answer}`;
                feedback.className = 'feedback incorrect';
            }
            
            totalCount++;
            
            // 1秒后显示下一题
            setTimeout(generateNextEquation, 1000);
        }

        // 结束游戏
        function endGame() {
            gameStarted = false;
            clearInterval(timerInterval);
            clearTimeout(autoNextTimer);
            
            startBtn.disabled = false;
            answerInput.disabled = true;
            clearBtn.disabled = true;
            submitBtn.disabled = true;
            
            // 显示结果
            finalTime.textContent = timer.textContent;
            correctCountEl.textContent = correctCount;
            const accuracy = Math.round((correctCount / totalCount) * 100);
            accuracyEl.textContent = accuracy;
            
            // 生成表扬语
            let praise = '';
            if (accuracy === 100) {
                praise = '太棒了！你是速算小天才！🎉\n全部答对，真厉害！';
            } else if (accuracy >= 80) {
                praise = '非常棒！你做得很好！🌟\n继续保持这样的好成绩！';
            } else if (accuracy >= 60) {
                praise = '不错哦！继续努力！👍\n多加练习会更厉害的！';
            } else {
                praise = '没关系！这次是第一次尝试！🌈\n下次一定会做得更好的！';
            }
            
            praiseText.textContent = praise;
            createFireworks();
            resultScreen.style.display = 'flex';
        }

        // 重新开始游戏
        function restartGame() {
            resultScreen.style.display = 'none';
            startGame();
        }

        // 添加数字
        function addNumber(num) {
            if (!gameStarted) return;
            
            const currentValue = answerInput.value;
            if (currentValue.length < 2) {
                answerInput.value = currentValue + num;
            }
        }

        // 清除答案
        function clearAnswer() {
            answerInput.value = '';
        }

        // 生成烟花效果
        function createFireworks() {
            const fireworks = document.getElementById('fireworks');
            fireworks.innerHTML = '';
            
            for (let i = 0; i < 30; i++) { // 减少烟花数量适配手机
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = Math.random() * 100 + '%';
                firework.style.top = Math.random() * 100 + '%';
                firework.style.animationDelay = Math.random() * 2 + 's';
                
                const colors = ['#FF6B6B', '#4ECDC4', '#667eea', '#FFD166', '#06D6A0'];
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                fireworks.appendChild(firework);
            }
        }

        // 回车键提交答案
        answerInput.addEventListener('keyup', function(e) {
            if (e.key === 'Enter' && gameStarted) {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
