<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>速算小达人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFE4E1 0%, #B0E0E6 100%);
        }

        .container {
            width: 100vw;
            height: 100vh;
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            font-size: 24px;
            animation: twinkle 1.5s infinite;
            z-index: 1;
        }
        .star-1 { top: 5%; left: 8%; }
        .star-2 { top: 8%; right: 10%; }
        .star-3 { bottom: 12%; left: 10%; }
        .star-4 { bottom: 8%; right: 8%; }

        @keyframes twinkle {
            0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
            z-index: 2;
        }
        .header h1 {
            font-size: 26px;
            color: #FF6B6B;
        }
        .header .subtitle {
            font-size: 14px;
            color: #888;
        }

        .time-box {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            z-index: 2;
        }
        .timer {
            flex:1;
            background: linear-gradient(135deg, #4ECDC4, #45B7D1);
            color:white;
            font-size: 18px;
            font-weight:bold;
            padding: 10px 0;
            border-radius: 50px;
            text-align:center;
        }
        .question-timer {
            flex:1;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color:white;
            font-size: 16px;
            font-weight:bold;
            padding: 10px 0;
            border-radius: 50px;
            text-align:center;
        }

        .progress {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
            z-index: 2;
        }
        .progress-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #eee;
        }
        .progress-dot.active {
            background: #4ECDC4;
            transform: scale(1.15);
        }
        .progress-dot.correct {
            background: #4CAF50;
        }
        .progress-dot.incorrect {
            background: #f44336;
        }

        .equation-box {
            background: #f7f8fa;
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            margin-bottom: 16px;
            border: 2px solid #eee;
            z-index: 2;
        }
        .equation {
            font-size: 42px;
            font-weight: bold;
            color: #333;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-input {
            width: 100%;
            margin-top:12px;
            padding: 14px;
            font-size: 24px;
            border: 3px solid #ddd;
            border-radius: 12px;
            outline: none;
            text-align: center;
        }
        .answer-input:focus {
            border-color: #4ECDC4;
        }

        .feedback {
            margin-top:10px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            display: none;
        }
        .feedback.correct {
            background: #E8F5E9;
            color: #2E7D32;
            display: block;
        }
        .feedback.incorrect {
            background: #FFEBEE;
            color: #C62828;
            display: block;
        }

        /* 手机数字键盘 */
        .number-pad {
            flex:1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            z-index: 2;
        }
        .number-btn {
            padding: 16px 0;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: #f1f3f5;
            cursor: pointer;
        }
        .number-btn:active {
            background: #FF6B6B;
            color:white;
            transform:scale(0.96);
        }

        .control-btn {
            grid-column: span 1;
            padding: 16px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color:white;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
        }
        .control-btn:active {
            transform:scale(0.96);
        }
        .control-btn:disabled {
            opacity:0.6;
        }

        /* 结果弹窗 */
        .result-screen {
            position: fixed;
            top:0;left:0;right:0;bottom:0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .result-content {
            background: white;
            width:85%;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
        }
        .result-content h2 {
            font-size: 26px;
            color: #667eea;
            margin-bottom:16px;
        }
        .stat-item {
            font-size: 18px;
            margin:8px 0;
        }
        .stat-value {
            font-weight:bold;
            color:#FF6B6B;
        }
        .praise-text {
            font-size:16px;
            color:#666;
            margin:20px 0;
            line-height:1.5;
        }

        .fireworks {
            position:absolute;
            top:0;left:0;right:0;bottom:0;
            pointer-events:none;
        }
        .firework {
            position:absolute;
            width:10px;height:10px;
            border-radius:50%;
            animation:firework 1s forwards;
        }
        @keyframes firework {
            0%{transform:scale(1);opacity:1;}100%{transform:scale(5);opacity:0;}
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="stars star-1">⭐</div>
        <div class="stars star-2">🌟</div>
        <div class="stars star-3">✨</div>
        <div class="stars star-4">⭐</div>

        <div class="header">
            <h1>速算小达人</h1>
            <p class="subtitle">20以内加减法</p>
        </div>

        <div class="time-box">
            <div class="timer" id="timer">00:00.00</div>
            <div class="question-timer" id="questionTimer">5.0秒</div>
        </div>

        <div class="progress" id="progress">
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
        </div>

        <div class="equation-box">
            <div class="equation" id="equation">点击开始</div>
            <input type="number" class="answer-input" id="answerInput" placeholder="答案" disabled>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="number-pad">
            <button class="number-btn" onclick="addNumber(1)">1</button>
            <button class="number-btn" onclick="addNumber(2)">2</button>
            <button class="number-btn" onclick="addNumber(3)">3</button>
            <button class="number-btn" onclick="addNumber(4)">4</button>
            <button class="number-btn" onclick="addNumber(5)">5</button>
            <button class="number-btn" onclick="addNumber(6)">6</button>
            <button class="number-btn" onclick="addNumber(7)">7</button>
            <button class="number-btn" onclick="addNumber(8)">8</button>
            <button class="number-btn" onclick="addNumber(9)">9</button>
            <button class="control-btn" id="startBtn" onclick="startGame()">开始</button>
            <button class="number-btn" onclick="addNumber(0)">0</button>
            <button class="control-btn" id="clearBtn" onclick="clearAnswer()" disabled>清除</button>
            <button class="control-btn" id="submitBtn" onclick="checkAnswer()" disabled>提交</button>
        </div>
    </div>

    <div class="result-screen" id="resultScreen">
        <div class="fireworks" id="fireworks"></div>
        <div class="result-content">
            <h2>🎉 挑战完成</h2>
            <div class="stat-item">用时：<span class="stat-value" id="finalTime">00:00.00</span></div>
            <div class="stat-item">正确：<span class="stat-value" id="correctCount">0</span> 题</div>
            <div class="stat-item">正确率：<span class="stat-value" id="accuracy">0</span>%</div>
            <div class="praise-text" id="praiseText"></div>
            <button class="control-btn" onclick="restartGame()" style="grid-column:span3">再玩一次</button>
        </div>
    </div>

<script>
    let gameStarted = false;
    let currentEquation = {};
    let correctCount = 0;
    let totalCount = 0;
    let startTime = 0;
    let timerInterval;
    let questionTimerInterval;
    let questionRemainingTime = 5;

    const equation = document.getElementById('equation');
    const answerInput = document.getElementById('answerInput');
    const feedback = document.getElementById('feedback');
    const startBtn = document.getElementById('startBtn');
    const clearBtn = document.getElementById('clearBtn');
    const submitBtn = document.getElementById('submitBtn');
    const timer = document.getElementById('timer');
    const progress = document.getElementById('progress');
    const questionTimer = document.getElementById('questionTimer');
    const resultScreen = document.getElementById('resultScreen');
    const finalTime = document.getElementById('finalTime');
    const correctCountEl = document.getElementById('correctCount');
    const accuracyEl = document.getElementById('accuracy');
    const praiseText = document.getElementById('praiseText');

    function generateEquation() {
        const isAddition = Math.random() > 0.5;
        let a,b,ans;
        if(isAddition){
            a = Math.floor(Math.random()*11)+1;
            b = Math.floor(Math.random()*(20-a))+1;
            ans = a+b;
            equation.textContent = `${a}+${b}=?`;
        }else{
            a = Math.floor(Math.random()*20)+1;
            b = Math.floor(Math.random()*a)+1;
            ans = a-b;
            equation.textContent = `${a}-${b}=?`;
        }
        return {answer:ans};
    }

    function startGame() {
        gameStarted = true;
        correctCount = 0;
        totalCount = 0;
        startTime = Date.now();
        startBtn.disabled = true;
        answerInput.disabled = false;
        clearBtn.disabled = false;
        submitBtn.disabled = false;
        progress.querySelectorAll('.progress-dot').forEach(d=>d.className='progress-dot');
        clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer,10);
        generateNextEquation();
    }

    function generateNextEquation() {
        if(totalCount>=10){endGame();return;}
        clearInterval(questionTimerInterval);
        questionRemainingTime=5;
        updateQTimer();
        currentEquation=generateEquation();
        answerInput.value='';
        feedback.textContent='';
        feedback.className='feedback';

        const dots=progress.querySelectorAll('.progress-dot');
        dots.forEach((d,i)=>{
            if(i<totalCount) d.className='progress-dot '+(i<correctCount?'correct':'incorrect');
            else if(i===totalCount) d.className='progress-dot active';
            else d.className='progress-dot';
        });

        questionTimerInterval=setInterval(()=>{
            questionRemainingTime-=0.1;
            updateQTimer();
            if(questionRemainingTime<=0){
                clearInterval(questionTimerInterval);
                checkAnswer();
            }
        },100);
    }

    function updateQTimer(){
        questionTimer.textContent=questionRemainingTime.toFixed(1)+'秒';
        questionTimer.style.color=questionRemainingTime<=1?'#ff0000':'#fff';
    }

    function updateTimer(){
        const e=Date.now()-startTime;
        const m=Math.floor(e/60000).toString().padStart(2,'0');
        const s=Math.floor((e%60000)/1000).toString().padStart(2,'0');
        const ms=Math.floor((e%1000)/10).toString().padStart(2,'0');
        timer.textContent=`${m}:${s}.${ms}`;
    }

    function checkAnswer(){
        clearInterval(questionTimerInterval);
        const val=parseInt(answerInput.value);
        if(isNaN(val)){
            feedback.textContent=`⏰ 时间到！答案：${currentEquation.answer}`;
            feedback.className='feedback incorrect';
        }else{
            if(val===currentEquation.answer){
                feedback.textContent='✓ 正确';
                feedback.className='feedback correct';
                correctCount++;
            }else{
                feedback.textContent=`✗ 答案：${currentEquation.answer}`;
                feedback.className='feedback incorrect';
            }
        }
        totalCount++;
        setTimeout(generateNextEquation,1000);
    }

    function endGame(){
        gameStarted=false;
        clearInterval(timerInterval);
        clearInterval(questionTimerInterval);
        startBtn.disabled=false;
        answerInput.disabled=true;
        clearBtn.disabled=true;
        submitBtn.disabled=true;
        finalTime.textContent=timer.textContent;
        correctCountEl.textContent=correctCount;
        const acc=Math.round((correctCount/totalCount)*100);
        accuracyEl.textContent=acc;
        let text='';
        if(acc===100)text='太棒了！你是速算小天才！🎉';
        else if(acc>=80)text='非常棒！继续加油！🌟';
        else if(acc>=60)text='不错哦！多练习更厉害！👍';
        else text='没关系！下次一定更好！🌈';
        praiseText.textContent=text;
        createFireworks();
        resultScreen.style.display='flex';
    }

    function restartGame(){
        resultScreen.style.display='none';
        startGame();
    }

    function addNumber(n){
        if(!gameStarted)return;
        if(answerInput.value.length<2)answerInput.value+=n;
    }

    function clearAnswer(){
        answerInput.value='';
    }

    function createFireworks(){
        const f=document.getElementById('fireworks');
        f.innerHTML='';
        const c=['#FF6B6B','#4ECDC4','#667eea','#FFD166','#06D6A0'];
        for(let i=0;i<40;i++){
            let d=document.createElement('div');
            d.className='firework';
            d.style.left=Math.random()*100+'%';
            d.style.top=Math.random()*100+'%';
            d.style.animationDelay=Math.random()*1.5+'s';
            d.style.background=c[Math.floor(Math.random()*c.length)];
            f.appendChild(d);
        }
    }

    answerInput.addEventListener('keyup',e=>{
        if(e.key==='Enter'&&gameStarted)checkAnswer();
    });
</script>
</body>
</html>
